# Workload class 6: job queuing and prioritization (preemption).
# A low-priority job occupies 6 of 8 quota GPUs on bench-cq. A high-priority
# job needing 4 is submitted (6+4 > 8 quota); Kueue must evict the
# low-priority workload to admit the high-priority one.
name: queue-priority
workload_class: 6
kind: preemption
description: Priority-based preemption on a contended queue
queue: bench-queue
runtime: torch-distributed
low_priority:
  priority_class: bench-low
  nodes: 2
  resources_per_node:
    nvidia.com/gpu: 3
    cpu: "16"
    memory: 64Gi
  hold_s: 600             # long enough to still be running when preempted
high_priority:
  priority_class: bench-high
  submit_after_s: 60      # submit once low-prio is Running
  nodes: 1
  resources_per_node:
    nvidia.com/gpu: 4
    cpu: "8"
    memory: 32Gi
  hold_s: 30
repetitions: 3
timeout_s: 1200
pass_criteria:
  - low-priority workload is evicted (Workload condition Evicted/Preempted)
  - high-priority job admitted and runs to completion
  - preemption latency (high-prio submit -> low-prio evicted -> high-prio running) recorded
  - low-priority workload requeued after high-priority completes
checks:
  - low_evicted
  - completed
  - low_requeued
